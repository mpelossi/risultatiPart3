policy_name: "memA-3way-NodeB"
memcached:
  node: "node-a-8core"
  cores: "0"
  threads: 1
jobs:
  # --- NODE A (7 Cores left) ---
  streamcluster:
    node: "node-a-8core"
    cores: "1-7"
    threads: 7
    after: "start"
  freqmine:
    node: "node-a-8core"
    cores: "1-7"
    threads: 7
    after: "streamcluster"

  # --- NODE B (4 Cores available) ---
  # Phase 1: 3 jobs concurrently
  blackscholes:
    node: "node-b-4core"
    cores: "0"
    threads: 1
    after: "start"
  vips:
    node: "node-b-4core"
    cores: "1"
    threads: 1
    after: "start"
  radix:
    node: "node-b-4core"
    cores: "2-3"
    threads: 2   # Safe power of 2!
    after: "start"
    
  # Phase 2: Sequential finish
  canneal:
    node: "node-b-4core"
    cores: "0-3"
    threads: 4
    after: "blackscholes" # Waits for the longest of the 3
  barnes:
    node: "node-b-4core"
    cores: "0-3"
    threads: 4
    after: "canneal"