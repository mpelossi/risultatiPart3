policy_name: "safe-memB-3way-concurrent"
memcached:
  node: "node-b-4core"
  cores: "0"
  threads: 1
jobs:
  streamcluster:
    node: "node-a-8core"
    cores: "0-7"
    threads: 8
    after: "start"
  freqmine:
    node: "node-a-8core"
    cores: "0-7"
    threads: 8
    after: "streamcluster"
  # --- CONCURRENT BLOCK ON NODE A ---
  barnes:
    node: "node-a-8core"
    cores: "0-3"
    threads: 4
    after: "freqmine"
  vips:
    node: "node-a-8core"
    cores: "4-6"
    threads: 3
    after: "freqmine"
  radix:
    node: "node-a-8core"
    cores: "7"
    threads: 1
    after: "freqmine"
    
  blackscholes:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "start"
  canneal:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "blackscholes"
    