policy_name: "golden-memB-perfect"
memcached:
  node: "node-b-4core"
  cores: "0"
  threads: 1
jobs:
  # --- NODE B PIPELINE (3 Cores) ---
  blackscholes:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "start"
  canneal:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "blackscholes"
  barnes:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "canneal"
    
  # --- NODE A PIPELINE (8 Cores) ---
  streamcluster:
    node: "node-a-8core"
    cores: "0-7"
    threads: 8
    after: "start"
  freqmine:
    node: "node-a-8core"
    cores: "0-7"
    threads: 8
    after: "streamcluster"
    
  # Concurrent block on Node A
  vips:
    node: "node-a-8core"
    cores: "0-3"
    threads: 4
    after: "freqmine"
  radix:
    node: "node-a-8core"
    cores: "4-7"
    threads: 4
    after: "freqmine"