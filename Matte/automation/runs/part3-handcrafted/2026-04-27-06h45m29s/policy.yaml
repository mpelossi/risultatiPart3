policy_name: "split-brain-NodeA"
memcached:
  node: "node-b-4core"
  cores: "0"
  threads: 1
jobs:
  # --- NODE B (3 Cores) ---
  canneal:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "start"

  barnes:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "canneal"

  # --- NODE A PIPELINE 1 (Cores 0-3) ---
  streamcluster:
    node: "node-a-8core"
    cores: "0-3"
    threads: 4
    after: "start"
  radix:
    node: "node-a-8core"
    cores: "0-3"
    threads: 4
    after: "streamcluster"

  # --- NODE A PIPELINE 2 (Cores 4-7) ---
  freqmine:
    node: "node-a-8core"
    cores: "4-7"
    threads: 4
    after: "start"
  vips:
    node: "node-a-8core"
    cores: "4-7"
    threads: 4
    after: "freqmine"
  blackscholes:
    node: "node-a-8core"
    cores: "4-7"
    threads: 4
    after: "vips"