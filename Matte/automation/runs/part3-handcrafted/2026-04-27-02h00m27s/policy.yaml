policy_name: "memB-perfect-balance"
memcached:
  node: "node-b-4core"
  cores: "0"
  threads: 1
jobs:
  # --- NODE A PIPELINE (Weaker cores, but 8 of them) ---
  streamcluster:
    node: "node-a-8core"
    cores: "0-7"
    threads: 8
    after: "start"
  freqmine:
    node: "node-a-8core"
    cores: "0-7"
    threads: 8
    after: "streamcluster"
    
  # Concurrent block on Node A (Starts after freqmine)
  vips:
    node: "node-a-8core"
    cores: "0-3"
    threads: 4
    after: "freqmine"
  radix:
    node: "node-a-8core"
    cores: "4-7"
    threads: 4  # POWER OF 2! Will run perfectly and finish in ~15s
    after: "freqmine"

  # --- NODE B PIPELINE (Faster Milan cores, 3 available) ---
  blackscholes:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "start"
  canneal:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "blackscholes"
  barnes:
    node: "node-b-4core"
    cores: "1-3"
    threads: 3
    after: "canneal"